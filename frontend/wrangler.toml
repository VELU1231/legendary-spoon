# Cloudflare Workers — JobSniper Frontend
# https://developers.cloudflare.com/workers/static-assets/
#
# Deploy command: npx wrangler deploy
# Build command:  CF_PAGES=1 npm run build   (outputs to ./out)

name = "jobsniper-frontend"
compatibility_date = "2026-04-25"

[assets]
directory = "./out"

# Set environment variables in the Cloudflare dashboard under
# Workers & Pages → jobsniper-frontend → Settings → Variables
# NEXT_PUBLIC_API_URL  = "https://your-backend.onrender.com"
# NEXT_PUBLIC_WS_URL   = "wss://your-backend.onrender.com/ws"
